  #app{

  }

    display:block;background:var(--surface2);color:var(--text);text-decoration:none;

  }

    padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.08em;
  }
  /* ---------- bottom tabs ---------- */
  #tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    display:flex;justify-content:center;gap:4px;
    background:rgba(16,19,24,.92);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));
  }
  #tabs button{
    flex:1;max-width:150px;background:none;border:0;color:var(--muted);

  }
  #tabs button.active{color:var(--accent);background:var(--surface2)}
  #tabs button:focus-visible{outline:2px solid var(--accent)}

  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin:10px 0;
  }
  .card h3{margin:0 0 2px;font-family:var(--disp);font-size:20px;letter-spacing:.02em;text-transform:uppercase}
  .muted{color:var(--muted);font-size:13px}
  .tip{
    color:var(--muted);font-size:13px;margin:6px 0 10px;padding-left:10px;
    border-left:2px solid var(--line);
  }
  .lastline{font-size:13px;margin:4px 0;color:var(--text)}
  .lastline b{font-variant-numeric:tabular-nums}
  .suggest{
    font-size:13px;color:var(--accent);margin:2px 0 10px;
  }
  .suggest.deload{color:var(--teal)}

  .dayhead{display:flex;align-items:center;gap:10px;margin:16px 0 4px;flex-wrap:wrap}

  .datebtns{display:flex;gap:6px;margin-left:auto}
  .datebtns button,.ghost{
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:6px 12px;font-size:14px;cursor:pointer;
  }
  .datebtns button:focus-visible,.ghost:focus-visible{outline:2px solid var(--accent)}
  /* ---------- set rows ---------- */
  table.sets{border-collapse:collapse;width:100%;margin:4px 0 8px}
  table.sets td{padding:3px 6px 3px 0}
  table.sets td:first-child{color:var(--muted);font-size:13px;width:52px}
  input[type=number],input.num,input[type=date],input[type=email],select,textarea{
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:9px 10px;font-size:16px;width:100%;
    font-variant-numeric:tabular-nums;
  }
  input[type=number],input.num{width:84px;text-align:center}
  input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);border-color:var(--accent)}
  .unit{color:var(--muted);font-size:12px;padding:0 8px 0 4px}
  .addset{background:none;border:1px dashed var(--line);color:var(--muted);border-radius:8px;
    padding:5px 12px;font-size:13px;cursor:pointer}

  .feels{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .feels button{
    border:1px solid var(--line);background:var(--surface2);color:var(--muted);

  .feels button.sel-raskas{background:var(--f-raskas);border-color:var(--f-raskas);color:#1d0f03;font-weight:600}
  .feels button.sel-eraskas{background:var(--f-eraskas);border-color:var(--f-eraskas);color:#210409;font-weight:600}

  .feel-kevyt{background:var(--f-kevyt);color:#04140d}
  .feel-sopiva{background:var(--f-sopiva);color:#071322}
  .feel-raskas{background:var(--f-raskas);color:#1d0f03}
  .feel-eraskas{background:var(--f-eraskas);color:#210409}

  .variant{display:flex;align-items:center;gap:8px;margin:2px 0 4px}
  .variant select{width:auto;flex:1;font-size:14px;padding:6px 8px}
  .variant .swap{color:var(--muted);font-size:12px;white-space:nowrap}
  /* ---------- week calendar ---------- */
  .weeknav{display:flex;align-items:center;gap:10px;margin:14px 0 6px}

    display:flex;align-items:center;gap:12px;width:100%;text-align:left;

  }
  .daycard:focus-visible{outline:2px solid var(--accent)}
  .daycard.today{border-color:var(--accent)}

  .daycard .what .sub{color:var(--muted);font-size:13px}

  details.guide summary b{color:var(--text);font-size:15px}
  details.guide ul{color:var(--muted);font-size:14px;padding-left:20px}
  details.guide li{margin:4px 0}

  .stat{background:var(--surface2);border-radius:10px;padding:10px 8px;text-align:center}

  .stat span{font-size:12px;color:var(--muted)}

  .primary{

  #toast{

  .deload-banner{
    background:rgba(76,201,192,.12);border:1px solid var(--teal);border-radius:var(--radius);
    padding:10px 14px;margin:10px 0;font-size:14px;color:var(--teal);
  }

const KEY = 'treenipaivakirja_v1';
function mondayOf(d){ const x=new Date(d); const wd=(x.getDay()+6)%7; x.setDate(x.getDate()-wd); return x; }
function iso(d){ const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function fromIso(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(s,n){ const d=fromIso(s); d.setDate(d.getDate()+n); return iso(d); }
function fmtFi(s){ const d=fromIso(s); return d.getDate()+'.'+(d.getMonth()+1)+'.'; }

let state;
try { state = JSON.parse(localStorage.getItem(KEY)) || null; } catch(e){ state = null; }
if (!state) state = { start: iso(mondayOf(new Date())), deloadEvery: 4, sessions: {}, defaults: {} };
if (!state.sessions) state.sessions = {};
if (!state.defaults) state.defaults = {};
if (!state.deloadEvery) state.deloadEvery = 4;
if (!state.prs) state.prs = {};

let saveTimer=null;
function save(quiet){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    localStorage.setItem(KEY, JSON.stringify(state));
    if(!quiet) toast('Tallennettu ✓');
    if(cloudOn()) pushDay(selDate);
  }, 350);
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1400);
}

function loadAuth(){ try{ sbSession=JSON.parse(localStorage.getItem('tpk_auth'))||null; }catch(e){ sbSession=null; } }
function saveAuth(){ if(sbSession) localStorage.setItem('tpk_auth', JSON.stringify(sbSession)); else localStorage.removeItem('tpk_auth'); }
function sbHeaders(){ return { apikey:SB_KEY, Authorization:'Bearer '+sbSession.access_token, 'Content-Type':'application/json' }; }

/* Magic linkin paluu: tokenit URL-häshissä */
function handleAuthHash(){
  if(location.hash && location.hash.indexOf('access_token=')>=0){
    const p=new URLSearchParams(location.hash.slice(1));
    const at=p.get('access_token'), rt=p.get('refresh_token');
    if(at){ sbSession={access_token:at, refresh_token:rt, user:null}; saveAuth();
      history.replaceState(null,'',location.pathname+location.search); }
  }
}
async function sbSendLink(email){
  const r=await fetch(SB_URL+'/auth/v1/otp?redirect_to='+encodeURIComponent(location.origin+location.pathname),{
    method:'POST', headers:{apikey:SB_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email:email, create_user:true})});
  if(!r.ok){ const j=await r.json().catch(()=>({})); throw new Error(j.msg||j.error_description||('HTTP '+r.status)); }
}
async function sbRefresh(){
  if(!sbSession||!sbSession.refresh_token) return false;
  try{
    const r=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{
      method:'POST', headers:{apikey:SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:sbSession.refresh_token})});
    if(!r.ok) throw new Error('refresh');
    const j=await r.json();
    sbSession={access_token:j.access_token, refresh_token:j.refresh_token, user:j.user||sbSession.user};
    saveAuth(); return true;
  }catch(e){ sbSession=null; saveAuth(); return false; }
}
async function sbUser(){
  if(!sbSession) return null;
  if(!sbSession.user){
    try{
      const r=await fetch(SB_URL+'/auth/v1/user',{headers:{apikey:SB_KEY,Authorization:'Bearer '+sbSession.access_token}});
      if(r.ok){ sbSession.user=await r.json(); saveAuth(); }
    }catch(e){}
  }
  return sbSession.user;
}

    if(r.ok){ for(const row of await r.json()){ if(!state.sessions[row.pvm]) state.sessions[row.pvm]=row.data; } }

    } }
    localStorage.setItem(KEY, JSON.stringify(state));

function weekNum(dateIso){
  const a=mondayOf(fromIso(state.start)), b=mondayOf(fromIso(dateIso));
  return Math.floor((b-a)/(7*864e5))+1;
}
function isDeload(dateIso){
  const w=weekNum(dateIso);
  return w>0 && w % state.deloadEvery === 0;
}
function dayKeyOf(dateIso){ return DAYS[(fromIso(dateIso).getDay()+6)%7]; }

function getSession(dateIso){ return state.sessions[dateIso]; }
function ensureSession(dateIso){
  if(!state.sessions[dateIso]) state.sessions[dateIso] = { entries:{}, notes:'', steps:'', feel:null, done:false, cardio:{} };
  return state.sessions[dateIso];
}
function ensureEntry(dateIso, ex){
  const s=ensureSession(dateIso);
  if(!s.entries[ex.id]){
    const variant = state.defaults[ex.id] || ex.name;
    s.entries[ex.id] = { name:variant, sets:Array.from({length:ex.sets},()=>({w:'',r:''})), feel:null };
  }
  return s.entries[ex.id];
}
function sessionDone(s, dk){
  if(!s) return false;
  if(s.done) return true;
  if(s.cardio && s.cardio.kesto) return true;
  return Object.values(s.entries||{}).some(e=>e.sets && e.sets.some(x=>x.r!=='' && x.r!=null));
}

/* Viimeisin kirjaus liikevariantille (nimen mukaan) ennen annettua päivää */
function findLast(variantName, beforeIso){
  const dates=Object.keys(state.sessions).filter(d=>d<beforeIso).sort().reverse();
  for(const d of dates){
    const s=state.sessions[d];
    for(const e of Object.values(s.entries||{})){
      if(e.name===variantName && e.sets && e.sets.some(x=>x.r!=='' && x.r!=null)){
        return { date:d, sets:e.sets.filter(x=>x.r!=='' && x.r!=null), feel:e.feel };
      }
    }
  }
  return null;
}
function topWeight(sets){ return Math.max(...sets.map(x=>parseFloat(x.w)||0)); }
function roundInc(v,inc){ return Math.round(v/inc)*inc; }

function suggestion(ex, variantName, dateIso){
  const last=findLast(variantName, dateIso);
  const deload=isDeload(dateIso);
  if(!last){
    return { cls:'', txt: deload
      ? 'Kevennysviikko — pidä kuormat reippaasti varman puolella.'
      : 'Ensimmäinen kirjaus — hae sopiva aloituspaino tekniikka edellä.' };
  }
  const tw=topWeight(last.sets);
  if(deload){
    const dw = tw>0 ? roundInc(tw*0.65, 2.5) : 0;
    return { cls:'deload', txt:'Kevennysviikko: noin '+(dw>0? dw+' kg' : 'selvästi kevyempi kuorma')+' — jätä 3–4 toistoa varastoon.' };
  }
  if(ex.maxSet){
    const best=Math.max(...last.sets.map(x=>parseInt(x.r)||0));
    return { cls:'', txt:'Tavoite: yli '+best+' '+(ex.unit||'toistoa')+' — keho tarvitsee uuden ärsykkeen.' };
  }
  const allTop = last.sets.length>=ex.sets && last.sets.every(x=>(parseInt(x.r)||0)>=ex.max);
  if(allTop && tw>0){
    return { cls:'', txt:'Viimeksi kaikki sarjat ylärajassa ('+ex.max+') → lisää painoa: kokeile '+(tw+ex.inc)+' kg.' };
  }
  const anyBelow = last.sets.some(x=>(parseInt(x.r)||0) < ex.min);
  if(last.feel==='eraskas' || anyBelow){
    return { cls:'', txt:'Viimeksi tuntui erittäin raskaalta' + (anyBelow?' / toistot jäivät alle '+ex.min:'') + ' → pidä '+(tw>0?tw+' kg':'sama paino')+' ja hio toistoja.' };
  }
  return { cls:'', txt:'Pidä '+(tw>0?tw+' kg':'sama paino')+' ja tavoittele +1 toisto per sarja.' };
}
function setsToStr(sets){
  return sets.map(x=>{
    const w=x.w!==''&&x.w!=null?x.w:null, r=x.r;
    return w!=null ? (w+'×'+r) : String(r);
  }).join(' · ');
}

/* ---------- HISTORIA ---------- */
function statBox(v,l){ return '<div class="stat"><b>'+v+'</b><span>'+l+'</span></div>'; }

/* Viikon tunnusluvut: treenit, sarjat, askeltavoite, nousseet painot */
function weekSummary(monIso){
  let done=0, setCount=0, stepDays=0, stepOk=0;
  const weekTop={};
  for(let i=0;i<7;i++){
    const d=addDays(monIso,i), s=state.sessions[d];
    if(!s) continue;
    if(sessionDone(s, dayKeyOf(d))) done++;
    if(s.steps){ stepDays++; if((parseInt(s.steps)||0)>=10000) stepOk++; }
    for(const e of Object.values(s.entries||{})){
      const sets=e.sets?e.sets.filter(x=>x.r!==''&&x.r!=null):[];
      setCount+=sets.length;
      const tw=sets.length?topWeight(sets):0;
      if(tw>0 && (!weekTop[e.name]||tw>weekTop[e.name])) weekTop[e.name]=tw;
    }
  }
  const improved=[];
  for(const [name,tw] of Object.entries(weekTop)){
    let prev=0;
    for(const [d,s] of Object.entries(state.sessions)){
      if(d>=monIso) continue;
      for(const e of Object.values(s.entries||{})){
        if(e.name===name && e.sets){
          const t=topWeight(e.sets.filter(x=>x.r!==''&&x.r!=null));
          if(t>prev) prev=t;
        }
      }
    }
    if(prev>0 && tw>prev) improved.push(name);
  }
  return {done, setCount, stepDays, stepOk, improved};
}

function renderHistory(){
  const names=new Set();
  for(const s of Object.values(state.sessions))
    for(const e of Object.values(s.entries||{}))
      if(e.sets && e.sets.some(x=>x.r!==''&&x.r!=null)) names.add(e.name);
  const list=[...names].sort();
  if(!histSel || !names.has(histSel)) histSel=list[0]||'';

  let html='<div class="dayhead"><h2>Historia</h2></div>';

  /* Viikkokooste: viime viikko */
  const lastMon=addDays(iso(mondayOf(new Date())),-7);
  const ws=weekSummary(lastMon);
  html+='<div class="card"><h3 style="font-size:17px">Viikkokooste · '+fmtFi(lastMon)+'–'+fmtFi(addDays(lastMon,6))+'</h3>'
    +'<div class="statgrid">'
    +statBox(ws.done,'treeniä tehty')
    +statBox(ws.setCount,'sarjaa kirjattu')
    +statBox(ws.stepDays? ws.stepOk+'/'+ws.stepDays : '—','askeltavoite täynnä')
    +statBox(ws.improved.length,'liikkeen paino nousi')
    +'</div>'
    +(ws.improved.length?'<div class="muted" style="margin-top:8px">📈 Nousseet: '+ws.improved.map(esc).join(', ')+'</div>':'')
    +'</div>';

  if(!list.length){
    html+='<div class="card muted">Ei vielä kirjauksia. Kirjaa ensimmäinen treeni Treeni-välilehdellä — historia ja kehitysehdotukset ilmestyvät tähän.</div>';
    $view.innerHTML=html; return;
  }
  html+='<div class="field"><label>Liike</label><select id="histsel">'
    +list.map(n=>'<option'+(n===histSel?' selected':'')+'>'+esc(n)+'</option>').join('')+'</select></div>';

  const rows=[];
  for(const [d,s] of Object.entries(state.sessions)){
    for(const e of Object.values(s.entries||{})){
      if(e.name===histSel){
        const done=e.sets.filter(x=>x.r!==''&&x.r!=null);
        if(done.length) rows.push({date:d, sets:done, feel:e.feel});
      }
    }
  }
  rows.sort((a,b)=>a.date<b.date?1:-1);

  /* Ennätykset: kovin sarja, arvioitu 1RM (Epley), testattu 1RM */
  let bestSet=null;
  for(const r of rows){
    for(const x of r.sets){
      const w=parseFloat(x.w)||0, reps=parseInt(x.r)||0;
      if(w>0 && (!bestSet || w>bestSet.w || (w===bestSet.w && reps>bestSet.reps))) bestSet={w, reps, date:r.date};
    }
  }
  const est1rm = bestSet && bestSet.reps>0 ? Math.round(bestSet.w*(1+bestSet.reps/30)) : null;
  const prList = state.prs[histSel]||[];
  const bestPr = prList.reduce((a,p)=>(!a||p.w>a.w)?p:a, null);
  html+='<div class="card"><h3 style="font-size:17px">Ennätykset</h3><div class="statgrid">'
    +statBox(bestSet? bestSet.w+' kg × '+bestSet.reps : '—','kovin sarja'+(bestSet?' · '+fmtFi(bestSet.date):''))
    +statBox(est1rm? '~'+est1rm+' kg':'—','arvioitu 1RM')
    +statBox(bestPr? bestPr.w+' kg':'—','testattu 1RM'+(bestPr?' · '+fmtFi(bestPr.date):''))
    +statBox(prList.length,'1RM-testiä kirjattu')
    +'</div>'
    +'<div style="display:flex;gap:10px;align-items:flex-end;margin-top:10px">'
    +'<div class="field" style="margin:0"><label>Uusi 1RM-testi (kg)</label>'
    +'<input type="text" class="num" inputmode="decimal" autocomplete="off" id="prval" placeholder="kg"></div>'
    +'<button class="primary" id="praddbtn">Tallenna 1RM</button></div>'
    +'<div class="muted" style="margin-top:6px">Arvioitu 1RM lasketaan kovimmasta sarjasta (Epley). Testattu 1RM = itse nostettu yhden toiston maksimi.</div>'
    +'</div>';

  /* sparkline: kovimman sarjan paino ajassa */
  const pts=rows.slice().reverse().map(r=>topWeight(r.sets)).filter(v=>v>0);
  if(pts.length>1){
    const W=520,H=70,P=6;
    const mn=Math.min(...pts), mx=Math.max(...pts);
    const sx=i=>P+i*(W-2*P)/(pts.length-1);
    const sy=v=>mx===mn?H/2:H-P-(v-mn)*(H-2*P)/(mx-mn);
    const poly=pts.map((v,i)=>sx(i).toFixed(1)+','+sy(v).toFixed(1)).join(' ');
    const lastPt=sx(pts.length-1).toFixed(1)+','+sy(pts[pts.length-1]).toFixed(1);
    html+='<svg class="spark" viewBox="0 0 '+W+' '+H+'" width="100%" height="70" role="img" aria-label="Kovimman sarjan paino ajassa">'
      +'<polyline points="'+poly+'" fill="none" stroke="var(--accent)" stroke-width="2"/>'
      +'<circle cx="'+lastPt.split(',')[0]+'" cy="'+lastPt.split(',')[1]+'" r="3.5" fill="var(--accent)"/>'
      +'</svg><div class="muted" style="font-size:12px">Kovimman sarjan paino: '+mn+' → '+mx+' kg</div>';
  }

  html+='<table class="hist-table"><tr><th>Pvm</th><th>Sarjat (kg×toistot)</th><th>Tuntuma</th></tr>';
  for(const r of rows){
    html+='<tr><td>'+fmtFi(r.date)+'</td><td>'+esc(setsToStr(r.sets))+'</td>'
      +'<td>'+(r.feel?'<span class="feel-tag feel-'+r.feel+'">'+FEELN[r.feel]+'</span>':'—')+'</td></tr>';
  }
  html+='</table>';
  $view.innerHTML=html;
  document.getElementById('histsel').onchange=e=>{ histSel=e.target.value; render(true); };
  document.getElementById('praddbtn').onclick=()=>{
    const v=parseFloat((document.getElementById('prval').value||'').replace(',','.'));
    if(!v||v<=0){ toast('Anna paino kilogrammoina'); return; }
    if(!state.prs[histSel]) state.prs[histSel]=[];
    const pr={date: iso(new Date()), w: v};
    state.prs[histSel].push(pr);
    pushPr(histSel, pr);
    save(); render(true);
  };
}

/* ---------- ASETUKSET ---------- */
function renderSettings(){
  let html='<div class="dayhead"><h2>Asetukset</h2></div>'
    +'<div class="card"><h3 style="font-size:17px">☁️ Pilvisynkronointi</h3>'
    +(cloudOn()
      ? '<div class="muted" style="margin-bottom:10px">Kirjautunut: <b style="color:var(--text)">'+esc((sbSession.user&&sbSession.user.email)||'')+'</b>'
        +(syncMsg?' · '+esc(syncMsg):'')
        +'<br>Kirjaukset tallentuvat pilveen automaattisesti. Voit kirjautua samalla sähköpostilla toisellakin laitteella — kirjaukset seuraavat mukana.</div>'
        +'<button class="ghost" id="btnlogout">Kirjaudu ulos</button>'
      : '<div class="muted" style="margin-bottom:10px">Kirjaudu sähköpostilla, niin kirjaukset tallentuvat pilveen eivätkä katoa vaikka selain tyhjenisi. Saat sähköpostiisi kirjautumislinkin — <b>avaa se tällä samalla laitteella</b>.</div>'
        +'<div class="field"><label>Sähköposti</label><input type="email" id="loginmail" autocomplete="email" placeholder="oma@sahkoposti.fi"></div>'
        +'<button class="primary" id="btnlogin">Lähetä kirjautumislinkki</button>')
    +'</div>'
    +'<div class="card"><h3 style="font-size:17px">Ohjelman jaksotus</h3>'
    +'<div class="field"><label>Ohjelman aloitusviikon maanantai</label>'
    +'<input type="date" id="setstart" value="'+state.start+'"></div>'
    +'<div class="field"><label>Kevennysviikko joka</label><select id="setdeload">'
    +[4,5,6].map(n=>'<option value="'+n+'"'+(state.deloadEvery===n?' selected':'')+'>'+n+'. viikko</option>').join('')
    +'</select></div>'
    +'<div class="muted">Nousujohteisuus: kun kaikki sarjat osuvat toistohaarukan ylärajaan, ohjelma ehdottaa painon lisäystä. Kevennysviikolla ehdotetaan n. 65 % painoja — palautuminen mahdollistaa seuraavan nousun.</div></div>'
    +'<div class="card"><h3 style="font-size:17px">iPhone-vinkki</h3>'
    +'<div class="muted">Lisää päiväkirja Koti-valikkoon, niin se avautuu kuin sovellus: avaa sivu Safarissa → paina <b>Jaa</b>-kuvaketta → <b>Lisää Koti-valikkoon</b>. Käytä aina samaa selainta ja laitetta — kirjaukset tallentuvat laitekohtaisesti.</div></div>'
    +'<div class="card"><h3 style="font-size:17px">Varmuuskopio</h3>'
    +'<div class="muted" style="margin-bottom:10px">Tiedot tallentuvat tämän selaimen muistiin (localStorage). Ota JSON-varmuuskopio silloin tällöin — sen voi tuoda takaisin toisella laitteella tai selaimen tyhjennyksen jälkeen. Huom: Safari voi siivota sivuston tiedot, jos sivulla ei käydä moneen viikkoon — viikoittainen käyttö riittää pitämään ne tallessa.</div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +'<button class="primary" id="btnexport">Lataa varmuuskopio</button>'
    +'<label class="ghost" style="display:inline-flex;align-items:center;cursor:pointer">Tuo varmuuskopio<input type="file" id="btnimport" accept=".json" hidden></label>'
    +'</div></div>'
    +'<div class="card"><h3 style="font-size:17px">Nollaus</h3>'
    +'<div class="muted" style="margin-bottom:10px">Poistaa kaikki kirjaukset tästä selaimesta. Ota varmuuskopio ensin!</div>'
    +'<button class="danger" id="btnreset">Tyhjennä kaikki tiedot</button></div>';
  $view.innerHTML=html;

  const bl=document.getElementById('btnlogin');
  if(bl) bl.onclick=async()=>{
    const em=(document.getElementById('loginmail').value||'').trim();
    if(!em||em.indexOf('@')<1){ toast('Anna sähköpostiosoite'); return; }
    bl.disabled=true; bl.textContent='Lähetetään…';
    try{ await sbSendLink(em); toast('Linkki lähetetty — tarkista sähköposti 📧'); bl.textContent='Linkki lähetetty ✓'; }
    catch(e){ toast('Lähetys epäonnistui: '+e.message); bl.disabled=false; bl.textContent='Lähetä kirjautumislinkki'; }
  };
  const bo=document.getElementById('btnlogout');
  if(bo) bo.onclick=()=>{ sbSession=null; saveAuth(); syncMsg=''; toast('Kirjauduttu ulos'); render(); };

  document.getElementById('setstart').onchange=e=>{
    if(e.target.value){ state.start=iso(mondayOf(fromIso(e.target.value))); save(); updateTopbar(); }
  };
  document.getElementById('setdeload').onchange=e=>{ state.deloadEvery=+e.target.value; save(); updateTopbar(); };
  document.getElementById('btnexport').onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='treenipaivakirja-varmuuskopio.json';
    a.click(); URL.revokeObjectURL(a.href);
  };
  document.getElementById('btnimport').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const obj=JSON.parse(rd.result);
        if(!obj || typeof obj.sessions!=='object') throw new Error('bad');
        state=obj;
        if(!state.defaults) state.defaults={};
        if(!state.deloadEvery) state.deloadEvery=4;
        if(!state.prs) state.prs={};
        localStorage.setItem(KEY, JSON.stringify(state));
        toast('Varmuuskopio tuotu ✓'); render();
      }catch(err){ toast('Tiedosto ei kelpaa — tarkista että se on tämän sovelluksen varmuuskopio.'); }
    };
    rd.readAsText(f);
  };
  document.getElementById('btnreset').onclick=()=>{
    if(confirm('Poistetaanko kaikki kirjaukset pysyvästi tästä selaimesta?')){
      state={ start: iso(mondayOf(new Date())), deloadEvery:4, sessions:{}, defaults:{}, prs:{} };
      localStorage.setItem(KEY, JSON.stringify(state));
      toast('Tiedot tyhjennetty'); render();
    }
  };
}

document.querySelectorAll('#tabs button').forEach(b=>{
  b.addEventListener('click',()=>{ tab=b.dataset.tab; render(); });
});
render();
cloudBoot();
</script>
